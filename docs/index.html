<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>レンタカー管理ダッシュボード</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>
    <div class="bg-shape bg-shape-c"></div>

    <main class="page">
      <header class="hero">
        <div>
          <p class="eyebrow">GitHub Pages × Google Sheets</p>
          <h1>レンタカー管理ダッシュボード</h1>
          <p class="hero-copy">
            スプレッドシートのデータを見やすく整理して、スマホでも確認しやすい形にした画面です。
          </p>
        </div>
        <div class="hero-meta">
          <div class="meta-card">
            <span>最終同期</span>
            <strong id="lastUpdated">-</strong>
          </div>
          <div class="meta-card">
            <span>シート</span>
            <strong id="sheetName">-</strong>
          </div>
        </div>
      </header>

      <section class="cards" id="summaryCards"></section>

      <section class="panel controls-panel">
        <div class="controls-row">
          <label class="search-wrap">
            <span class="label">検索</span>
            <input id="searchInput" type="search" placeholder="車名 / 車体番号 / 登録番号 / 売却先" />
          </label>

          <label>
            <span class="label">状態</span>
            <select id="statusFilter">
              <option value="all">すべて</option>
              <option value="active">稼働中</option>
              <option value="sold">売却済</option>
              <option value="scrapped">廃車済</option>
            </select>
          </label>

          <label>
            <span class="label">区分</span>
            <select id="categoryFilter">
              <option value="all">すべて</option>
              <option value="rental">レンタル</option>
              <option value="trade">売買</option>
            </select>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>車両一覧</h2>
            <p id="tableCount">0件</p>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>購入日</th>
                <th>番号</th>
                <th>名前</th>
                <th>車体ナンバー</th>
                <th>登録番号</th>
                <th>月額</th>
                <th>取得</th>
                <th>売却</th>
                <th>売却益</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="vehicleTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
