<html lang="ja">
  <head>

    <title>レンタカー管理ダッシュボード</title>
    <style>
:root {
  --bg: #ffffff;
  --text: #101010;
  --muted: #5c6572;
  --line: #dfe5eb;
  --card: rgba(255, 255, 255, 0.92);
  --blue: #2cc4f4;
  --yellow: #f4d544;
  --red: #ff5955;
  --green: #a8cb4b;
  --shadow: 0 14px 40px rgba(20, 29, 48, 0.08);
  --radius: 24px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
}

body {
  min-height: 100vh;
  position: relative;
}

.bg-shape {
  position: fixed;
  z-index: 0;
  border-radius: 9999px;
  opacity: 0.95;
  pointer-events: none;
}

.bg-shape-a {
  width: 260px;
  height: 260px;
  background: color-mix(in srgb, var(--blue) 80%, white 20%);
  top: -60px;
  right: -40px;
}

.bg-shape-b {
  width: 220px;
  height: 220px;
  background: color-mix(in srgb, var(--yellow) 90%, white 10%);
  bottom: 8%;
  left: -80px;
}

.bg-shape-c {
  width: 160px;
  height: 160px;
  background: color-mix(in srgb, var(--red) 80%, white 20%);
  right: -50px;
  bottom: 22%;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1240px;
  margin: 0 auto;
  padding: 36px 20px 72px;
}

.hero {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 20px;
  align-items: end;
  margin-bottom: 28px;
}

.eyebrow {
  display: inline-block;
  background: var(--blue);
  color: #062a36;
  font-weight: 800;
  padding: 8px 14px;
  border-radius: 999px;
  margin: 0 0 14px;
  font-size: 13px;
}

h1 {
  margin: 0;
  font-size: clamp(32px, 5vw, 56px);
  line-height: 1.02;
  letter-spacing: 0.02em;
}

.hero-copy {
  margin: 14px 0 0;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
  max-width: 58ch;
}

.hero-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.meta-card,
.summary-card,
.panel {
  background: var(--card);
  border: 1px solid rgba(16, 16, 16, 0.06);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.meta-card {
  padding: 18px 20px;
}

.meta-card span {
  display: block;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 8px;
}

.meta-card strong {
  font-size: 18px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
  margin-bottom: 22px;
}

.summary-card {
  padding: 22px 20px;
  position: relative;
  overflow: hidden;
}

.summary-card::after {
  content: "";
  position: absolute;
  width: 64px;
  height: 64px;
  border-radius: 999px;
  right: -16px;
  top: -16px;
  opacity: 0.9;
}

.summary-card:nth-child(1)::after { background: var(--blue); }
.summary-card:nth-child(2)::after { background: var(--green); }
.summary-card:nth-child(3)::after { background: var(--yellow); }
.summary-card:nth-child(4)::after { background: var(--red); }
.summary-card:nth-child(5)::after { background: var(--green); }
.summary-card:nth-child(6)::after { background: var(--blue); }
.summary-card:nth-child(7)::after { background: var(--red); }
.summary-card:nth-child(8)::after { background: var(--yellow); }

.summary-card .label {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 10px;
}

.summary-card .value {
  font-size: clamp(24px, 3vw, 34px);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: 0.01em;
}

.controls-panel {
  margin-bottom: 22px;
}

.controls-row {
  display: grid;
  grid-template-columns: 1.5fr 220px 220px;
  gap: 16px;
  padding: 18px;
}

label {
  display: grid;
  gap: 8px;
}

.label {
  font-size: 13px;
  color: var(--muted);
  font-weight: 700;
}

input,
select {
  appearance: none;
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px 16px;
  font-size: 15px;
  background: #fff;
  color: var(--text);
  outline: none;
}

input:focus,
select:focus {
  border-color: color-mix(in srgb, var(--blue) 65%, black 10%);
  box-shadow: 0 0 0 4px rgba(44, 196, 244, 0.18);
}

.panel {
  padding: 18px;
}

.panel-head {
  display: flex;
  justify-content: space-between;
  align-items: end;
  gap: 16px;
  margin-bottom: 16px;
}

.panel-head h2 {
  margin: 0;
  font-size: 24px;
}

.panel-head p {
  margin: 6px 0 0;
  color: var(--muted);
}

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1000px;
  background: #fff;
}

thead th {
  position: sticky;
  top: 0;
  background: #f8fafc;
  z-index: 1;
  text-align: left;
  font-size: 13px;
  color: var(--muted);
  font-weight: 800;
  letter-spacing: 0.02em;
}

th,
td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  white-space: nowrap;
}

tbody tr:hover {
  background: #fbfcfd;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 82px;
  padding: 9px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 800;
}

.badge.active {
  background: color-mix(in srgb, var(--green) 78%, white 22%);
  color: #263500;
}

.badge.sold {
  background: color-mix(in srgb, var(--blue) 78%, white 22%);
  color: #073246;
}

.badge.scrapped {
  background: color-mix(in srgb, var(--red) 78%, white 22%);
  color: #4f1111;
}

.mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

.muted {
  color: var(--muted);
}

@media (max-width: 980px) {
  .hero {
    grid-template-columns: 1fr;
  }

  .cards {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .controls-row {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 640px) {
  .page {
    padding: 20px 14px 48px;
  }

  .cards {
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .summary-card {
    padding: 18px 16px;
  }

  .summary-card .value {
    font-size: 24px;
  }

  .hero-meta {
    grid-template-columns: 1fr;
  }

  .panel {
    padding: 14px;
  }

  th,
  td {
    padding: 12px 12px;
  }
}

</style>

<script>
const fmtYen = new Intl.NumberFormat('ja-JP', {
  style: 'currency',
  currency: 'JPY',
  maximumFractionDigits: 0,
});

const fmtDateTime = new Intl.DateTimeFormat('ja-JP', {
  dateStyle: 'medium',
  timeStyle: 'short',
});

const statusMap = {
  active: '稼働中',
  sold: '売却済',
  scrapped: '廃車済',
};

const summaryConfig = [
  { key: 'record_count', label: '総レコード数', type: 'count' },
  { key: 'active_count', label: '稼働中', type: 'count' },
  { key: 'sold_count', label: '売却済', type: 'count' },
  { key: 'scrapped_count', label: '廃車済', type: 'count' },
  { key: 'rental_count', label: 'レンタル区分', type: 'count' },
  { key: 'trade_count', label: '売買区分', type: 'count' },
  { key: 'purchase_total', label: '取得合計', type: 'currency' },
  { key: 'profit_total', label: '売却益合計', type: 'currency' },
];

const state = {
  vehicles: [],
  filtered: [],
  summary: {},
  meta: {},
};

function formatCount(value) {
  return `${Number(value || 0).toLocaleString('ja-JP')}件`;
}

function formatCurrency(value) {
  return value == null ? '-' : fmtYen.format(value);
}

function formatSummaryValue(type, value) {
  if (type === 'currency') return formatCurrency(value);
  return formatCount(value);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

async function loadData() {
  state.vehicles = window.__BOOTSTRAP_DATA__.vehicles || [];
  state.filtered = [...state.vehicles];
  state.summary = window.__BOOTSTRAP_DATA__.summary || {};
  state.meta = window.__BOOTSTRAP_DATA__.meta || {};

  renderMeta();
  renderSummaryCards();
  applyFilters();
}

function renderSummaryCards() {
  const root = document.getElementById('summaryCards');
  root.innerHTML = summaryConfig
    .map(
      ({ key, label, type }) => `
        <article class="summary-card">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(formatSummaryValue(type, state.summary[key]))}</div>
        </article>
      `,
    )
    .join('');
}

function renderMeta() {
  const lastUpdatedEl = document.getElementById('lastUpdated');
  const sheetNameEl = document.getElementById('sheetName');

  if (state.meta.updated_at) {
    lastUpdatedEl.textContent = fmtDateTime.format(new Date(state.meta.updated_at));
  }
  if (state.meta.worksheet_title) {
    sheetNameEl.textContent = state.meta.worksheet_title;
  }
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const category = document.getElementById('categoryFilter').value;

  state.filtered = state.vehicles.filter((item) => {
    const matchQuery = !query || (item.search_text || '').includes(query);
    const matchStatus = status === 'all' || item.status === status;
    const matchCategory = category === 'all' || item.category === category;
    return matchQuery && matchStatus && matchCategory;
  });

  state.filtered.sort((a, b) => {
    const aDate = a.purchase_date || '';
    const bDate = b.purchase_date || '';
    if (aDate === bDate) return String(a.vehicle_id).localeCompare(String(b.vehicle_id), 'ja');
    return bDate.localeCompare(aDate);
  });

  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('vehicleTableBody');
  const tableCount = document.getElementById('tableCount');
  tableCount.textContent = `${state.filtered.length.toLocaleString('ja-JP')}件を表示`;

  tbody.innerHTML = state.filtered
    .map(
      (item) => `
        <tr>
          <td>${escapeHtml(item.purchase_date_raw || item.purchase_date || '-')}</td>
          <td class="mono">${escapeHtml(item.new_no || item.old_no || '-')}</td>
          <td>${escapeHtml(item.name || '-')}</td>
          <td class="mono">${escapeHtml(item.chassis_no || '-')}</td>
          <td>${escapeHtml(item.registration_no || '-')}</td>
          <td>${escapeHtml(item.current_monthly_fee_label || '-')}</td>
          <td>${escapeHtml(item.purchase_amount_label || '-')}</td>
          <td>${escapeHtml(item.sale_amount_label || '-')}</td>
          <td>${escapeHtml(item.profit_amount_label || '-')}</td>
          <td><span class="badge ${escapeHtml(item.status)}">${escapeHtml(item.status_label || statusMap[item.status] || '-')}</span></td>
        </tr>
      `,
    )
    .join('');
}

function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);
  document.getElementById('categoryFilter').addEventListener('change', applyFilters);
}

async function main() {
  try {
    await loadData();
    renderSummaryCards();
    renderMeta();
    bindEvents();
    applyFilters();
  } catch (error) {
    console.error(error);
    document.body.innerHTML = `
      <main class="page">
        <section class="panel">
          <h1>データの読み込みに失敗しました</h1>
          <p class="muted">単体版 index.html の読み込みに失敗しました。最新版の index.html に差し替えてください。</p>
          <pre class="muted">${escapeHtml(String(error))}</pre>
        </section>
      </main>
    `;
  }
}

main();

</script>
  </body>
</html>
