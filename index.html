<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>レンタカー台帳ダッシュボード</title>
  <meta name="description" content="Googleスプレッドシート連動前でも表示確認できる、GitHub Pages向けの車両管理ダッシュボード">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
      <div class="shape s3"></div>
      <div class="shape s4"></div>
      <span class="badge">GitHub Pages / root 構成</span>
      <h1>レンタカー台帳を<br>見やすくする画面</h1>
      <p>白多め + 原色アクセントの管理画面です。最初は同梱JSONで表示し、あとからスプシ連動に切り替えられます。</p>
      <div class="meta-row">
        <span id="metaInfo">読み込み中...</span>
      </div>
    </section>

    <div class="notice" id="noticeBox">
      <strong>いまの状態</strong><br>
      <span id="noticeText">読み込み中...</span>
    </div>

    <section class="cards" id="summaryCards"></section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>車両一覧</h2>
          <p>検索と絞り込みで、見たい行だけを出せます。</p>
        </div>
        <div class="kpi-note" id="resultCount">0件</div>
      </div>

      <div class="toolbar">
        <input class="input" id="searchInput" placeholder="名前 / 車体番号 / 登録番号 / 売却先で検索">
        <select id="statusFilter">
          <option value="all">状態: すべて</option>
          <option value="稼働中">状態: 稼働中</option>
          <option value="売却済">状態: 売却済</option>
          <option value="廃車">状態: 廃車</option>
          <option value="要確認">状態: 要確認</option>
        </select>
        <select id="categoryFilter">
          <option value="all">区分: すべて</option>
          <option value="rental">区分: レンタル</option>
          <option value="trade">区分: 売買</option>
        </select>
        <button id="resetBtn" class="primary">リセット</button>
      </div>

      <div class="table-wrap" style="margin-top:14px">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>購入日</th>
              <th>名前</th>
              <th>現行月額</th>
              <th>売却</th>
              <th>状態</th>
            </tr>
          </thead>
          <tbody id="vehicleRows">
            <tr><td colspan="6" class="empty">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="grid2">
      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>クローズ済み</h2>
            <p>売却済み / 廃車の新しい順</p>
          </div>
        </div>
        <div class="list" id="closedList"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>月額上位</h2>
            <p>稼働中の現行月額</p>
          </div>
        </div>
        <div class="list" id="monthlyList"></div>
      </section>
    </section>

    <div class="footer">
      最初はこのままで表示確認できます。スプシ連動を有効化すると、GitHub Actions が <code>data/*.json</code> を更新します。
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
